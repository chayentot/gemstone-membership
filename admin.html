<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gemstone Admin</title><link rel="stylesheet" href="styles.css"></head><body><header><div><h1>Administrator Portal</h1><div class="muted">Separate private page</div></div><nav><a class="btn ghost" href="index.html">Customer site</a><button id="aLogout" class="danger hidden">Logout</button></nav></header><main class="wrap"><div id="notice" class="notice hidden"></div><section id="aLogin" class="panel"><h2>Admin login</h2><form id="aLoginForm"><label>Username<input id="aUsername" required></label><label>Password<input id="aPassword" type="password" required></label><button class="full">Open admin</button></form><p class="muted">Default first login: admin / ChangeMe123!</p></section><section id="aDash" class="hidden"><div class="stats"><div class="stat">Members<strong id="sMembers">0</strong></div><div class="stat">Pending deposits<strong id="sPending">0</strong></div><div class="stat">Approved funds<strong id="sFunds">₱0</strong></div><div class="stat">Active memberships<strong id="sActive">0</strong></div></div><div class="panel"><h2>Pending deposits</h2><button id="refresh" class="ghost">Refresh</button><div class="table"><table><thead><tr><th>Member</th><th>Amount</th><th>Method</th><th>Reference</th><th>Proof</th><th>Action</th></tr></thead><tbody id="pendingBody"></tbody></table></div></div><div class="panel"><h2>Members</h2><div class="table"><table><thead><tr><th>Member</th><th>Wallet</th><th>Membership</th><th>Points</th><th>Claims</th><th>Perk note</th></tr></thead><tbody id="membersBody"></tbody></table></div></div></section></main><script src="config.js"></script><script src="admin.js"></script></body></html>
